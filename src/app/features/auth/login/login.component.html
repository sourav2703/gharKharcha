<div class="container-fluid vh-100">
  <div class="row h-100">

    <!-- LEFT -->
    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-primary text-white">
      <div class="text-center px-5">
        <h1 class="fw-bold mb-3">Ghar Kharcha</h1>
        <p class="lead">Manage your family expenses easily</p>
        <i class="pi pi-wallet" style="font-size: 4rem;"></i>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">

      <p-card styleClass="shadow-lg border-0" [style]="{width:'100%', maxWidth:'400px'}">

        <ng-template pTemplate="header">
          <div class="text-center w-100 mt-3">
            <h3 class="fw-bold">Welcome Back</h3>
          </div>
        </ng-template>

        <form [formGroup]="form" (ngSubmit)="login()" class="mt-3">

          <!-- Username -->
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input pInputText formControlName="username" class="w-100" />
            <small class="text-danger" *ngIf="f['username'].touched && f['username'].invalid">
              Username required
            </small>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label>Password</label>
            <input pPassword formControlName="password" class="w-100" [feedback]="false" />
            <small class="text-danger" *ngIf="f['password'].touched && f['password'].invalid">
              Password required
            </small>
          </div>

          <!-- Role -->
          <div class="mb-3">
            <label>Role</label>
            <select formControlName="role" class="form-select">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button pButton type="submit" label="Login" class="w-100"></button>

          <small class="text-danger d-block text-center mt-2">{{ error }}</small>

        </form>

        <p class="text-center mt-3">
          Don’t have account?
          <a routerLink="/signup">Signup</a>
        </p>

      </p-card>

    </div>
  </div>
</div>
