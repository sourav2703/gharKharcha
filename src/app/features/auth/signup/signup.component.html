<div class="container-fluid vh-100">
  <div class="row h-100">

    <!-- LEFT -->
    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-primary text-white">
      <div class="text-center px-5">
        <h1 class="fw-bold">Ghar Kharcha</h1>
        <p>Create your account</p>
        <i class="pi pi-user-plus" style="font-size: 4rem;"></i>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">

      <p-card styleClass="shadow-lg border-0" [style]="{width:'100%', maxWidth:'400px'}">

        <h3 class="text-center mt-3">Signup</h3>

        <form [formGroup]="form" (ngSubmit)="signup()" class="mt-3">

          <input pInputText formControlName="name" placeholder="Full Name" class="w-100 mb-2" />
          <small class="text-danger" *ngIf="f['name'].touched && f['name'].invalid">Required</small>

          <input pInputText formControlName="username" placeholder="Username" class="w-100 mb-2" />
          <small class="text-danger" *ngIf="f['username'].touched && f['username'].invalid">Required</small>

          <input pPassword formControlName="password" placeholder="Password" class="w-100 mb-2" [feedback]="false" />
          <small class="text-danger" *ngIf="f['password'].touched && f['password'].invalid">
            Min 4 characters
          </small>

          <select formControlName="role" class="form-select mb-3">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>

          <button pButton type="submit" label="Signup" class="w-100"></button>

        </form>

        <p class="text-center mt-3">
          Already have account?
          <a routerLink="/login">Login</a>
        </p>

      </p-card>

    </div>
  </div>
</div>
